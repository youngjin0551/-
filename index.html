<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="찬진 가계부">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<title>찬진 가계부</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0a0a0f;
  --surface:   #12121a;
  --card:      #1a1a26;
  --border:    #2a2a3e;
  --text:      #e8e8f0;
  --muted:     #6b6b8a;
  --wife:      #f472b6;
  --wife-dim:  #3d1a2e;
  --husb:      #60a5fa;
  --husb-dim:  #1a2a3d;
  --joint:     #a78bfa;
  --joint-dim: #2a1a3d;
  --income:    #34d399;
  --expense:   #f87171;
  --fixed:     #fbbf24;
  --safe: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overscroll-behavior: none;
  font-size: 14px;
}

/* ── 상단 헤더 ── */
.app-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--bg);
  padding-top: env(safe-area-inset-top, 0px);
  padding-left: 20px; padding-right: 20px;
  border-bottom: 1px solid var(--border);
}
.header-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0;
}
.app-title {
  font-size: 18px; font-weight: 700; letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--wife), var(--husb));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.month-nav {
  display: flex; align-items: center; gap: 10px;
}
.month-btn {
  background: var(--card); border: 1px solid var(--border);
  color: var(--muted); border-radius: 8px;
  width: 30px; height: 30px; font-size: 14px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.month-label { font-size: 13px; font-weight: 600; color: var(--text); min-width: 60px; text-align: center; }

/* ── 탭바 ── */
.tab-bar {
  display: flex; border-top: 1px solid var(--border);
  background: var(--bg);
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; padding: 8px 4px; cursor: pointer;
  color: var(--muted); font-size: 10px; font-weight: 500;
  border: none; background: none; transition: color .2s;
}
.tab-item.active { color: var(--wife); }
.tab-icon { font-size: 20px; line-height: 1; }

/* ── 스크롤 영역 ── */
.scroll-area {
  padding-top: calc(env(safe-area-inset-top, 0px) + 105px);
  padding-bottom: calc(80px + var(--safe));
  min-height: 100dvh;
}

/* ── 뷰 패널 ── */
.view { display: none; padding: 16px; }
.view.active { display: block; }

/* ── 요약 카드 ── */
.summary-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px;
}
.sum-card {
  background: var(--card); border-radius: 16px; padding: 14px 16px;
  border: 1px solid var(--border);
}
.sum-card.full { grid-column: 1/-1; }
.sum-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
.sum-value { font-size: 22px; font-weight: 700; letter-spacing: -1px; font-family: 'DM Mono', monospace; }
.sum-value.income  { color: var(--income); }
.sum-value.expense { color: var(--expense); }
.sum-value.balance { color: var(--text); }
.sum-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── 지출자별 미니카드 ── */
.owner-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.owner-card {
  border-radius: 14px; padding: 12px 10px; text-align: center;
  border: 1px solid;
}
.owner-card.wife  { background: var(--wife-dim);  border-color: var(--wife);  }
.owner-card.husb  { background: var(--husb-dim);  border-color: var(--husb);  }
.owner-card.joint { background: var(--joint-dim); border-color: var(--joint); }
.owner-name { font-size: 11px; font-weight: 700; margin-bottom: 4px; }
.owner-card.wife  .owner-name { color: var(--wife); }
.owner-card.husb  .owner-name { color: var(--husb); }
.owner-card.joint .owner-name { color: var(--joint); }
.owner-amount { font-size: 14px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--text); }

/* ── 섹션 제목 ── */
.section-title {
  font-size: 12px; font-weight: 700; color: var(--muted);
  letter-spacing: 1px; text-transform: uppercase;
  margin: 18px 0 8px;
}

/* ── 거래 목록 ── */
.tx-list { display: flex; flex-direction: column; gap: 6px; }
.tx-item {
  background: var(--card); border-radius: 14px; padding: 12px 14px;
  border: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  position: relative; overflow: hidden;
  animation: slideIn .2s ease;
}
@keyframes slideIn {
  from { opacity:0; transform: translateY(8px); }
  to   { opacity:1; transform: translateY(0); }
}
.tx-item::before {
  content:''; position: absolute; left:0; top:0; bottom:0; width: 3px;
}
.tx-item.wife::before  { background: var(--wife); }
.tx-item.husb::before  { background: var(--husb); }
.tx-item.joint::before { background: var(--joint); }

.tx-icon {
  width: 38px; height: 38px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
  background: var(--surface);
}
.tx-info { flex: 1; min-width: 0; }
.tx-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-meta { font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; gap: 6px; align-items: center; }
.owner-badge {
  font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 20px;
}
.owner-badge.wife  { background: var(--wife-dim);  color: var(--wife);  }
.owner-badge.husb  { background: var(--husb-dim);  color: var(--husb);  }
.owner-badge.joint { background: var(--joint-dim); color: var(--joint); }
.type-badge {
  font-size: 10px; padding: 1px 5px; border-radius: 4px; font-weight: 600;
}
.type-badge.fixed    { background: rgba(251,191,36,.15);  color: var(--fixed); }
.type-badge.variable { background: rgba(248,113,113,.12); color: var(--expense); }
.type-badge.income-t { background: rgba(52,211,153,.12);  color: var(--income); }

.tx-amount { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 600; text-align: right; }
.tx-amount.income  { color: var(--income); }
.tx-amount.expense { color: var(--expense); }

.tx-delete {
  width: 26px; height: 26px; border-radius: 8px;
  background: rgba(248,113,113,.1); border: none; color: var(--expense);
  font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* ── FAB 버튼 ── */
.fab {
  position: fixed; right: 20px;
  bottom: calc(68px + var(--safe) + 16px);
  width: 56px; height: 56px; border-radius: 18px;
  background: linear-gradient(135deg, var(--wife), #a855f7);
  border: none; color: #fff; font-size: 26px;
  box-shadow: 0 8px 24px rgba(244,114,182,.4);
  cursor: pointer; z-index: 90;
  display: flex; align-items: center; justify-content: center;
  transition: transform .15s, box-shadow .15s;
}
.fab:active { transform: scale(.93); box-shadow: 0 4px 12px rgba(244,114,182,.3); }

/* ── 모달 ── */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  backdrop-filter: blur(6px); z-index: 200;
  display: none; align-items: flex-end;
}
.modal-backdrop.open { display: flex; }
.modal {
  width: 100%; background: var(--surface);
  border-radius: 28px 28px 0 0;
  padding: 0 20px calc(20px + var(--safe));
  border: 1px solid var(--border); border-bottom: none;
  max-height: 92dvh; overflow-y: auto;
  animation: slideUp .25s cubic-bezier(.16,1,.3,1);
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.modal-handle {
  width: 36px; height: 4px; background: var(--border);
  border-radius: 2px; margin: 12px auto 20px;
}
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; letter-spacing: -0.5px; }

/* ── 폼 요소 ── */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; display: block; letter-spacing: .5px; }
.form-input, .form-select {
  width: 100%; background: var(--card); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 13px 14px; color: var(--text);
  font-size: 15px; font-family: 'Noto Sans KR', sans-serif;
  outline: none; transition: border-color .2s;
  appearance: none; -webkit-appearance: none;
}
.form-input:focus, .form-select:focus { border-color: var(--wife); }
.form-input.amount-input {
  font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 600;
  text-align: right;
}
.amount-display {
  text-align: right; font-size: 12px; color: var(--muted); margin-top: 4px;
}

/* ── 타입 토글 ── */
.type-toggle { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 14px; }
.toggle-btn {
  padding: 10px 6px; border-radius: 12px; border: 1.5px solid var(--border);
  background: var(--card); color: var(--muted); font-size: 12px; font-weight: 600;
  cursor: pointer; text-align: center; transition: all .15s;
  font-family: 'Noto Sans KR', sans-serif;
}
.toggle-btn.active.income-t  { border-color: var(--income); background: rgba(52,211,153,.12); color: var(--income); }
.toggle-btn.active.fixed     { border-color: var(--fixed);  background: rgba(251,191,36,.12);  color: var(--fixed); }
.toggle-btn.active.variable  { border-color: var(--expense);background: rgba(248,113,113,.12);color: var(--expense); }

/* ── 지출자 선택 ── */
.owner-select-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 14px; }
.owner-btn {
  padding: 10px 6px; border-radius: 12px; border: 1.5px solid var(--border);
  background: var(--card); color: var(--muted); font-size: 12px; font-weight: 700;
  cursor: pointer; text-align: center; transition: all .15s;
  font-family: 'Noto Sans KR', sans-serif;
}
.owner-btn.active.wife  { border-color: var(--wife);  background: var(--wife-dim);  color: var(--wife); }
.owner-btn.active.husb  { border-color: var(--husb);  background: var(--husb-dim);  color: var(--husb); }
.owner-btn.active.joint { border-color: var(--joint); background: var(--joint-dim); color: var(--joint); }

/* ── 카테고리 그리드 ── */
.cat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 14px; }
.cat-btn {
  padding: 8px 4px; border-radius: 10px; border: 1.5px solid var(--border);
  background: var(--card); color: var(--muted); font-size: 11px; font-weight: 500;
  cursor: pointer; text-align: center; transition: all .15s;
  font-family: 'Noto Sans KR', sans-serif;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.cat-btn .cat-emoji { font-size: 18px; }
.cat-btn.active { border-color: var(--wife); background: rgba(244,114,182,.1); color: var(--wife); }

/* ── 저장 버튼 ── */
.save-btn {
  width: 100%; padding: 16px; border-radius: 16px; border: none;
  background: linear-gradient(135deg, var(--wife), #a855f7);
  color: #fff; font-size: 16px; font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; margin-top: 8px;
  box-shadow: 0 6px 20px rgba(244,114,182,.35);
  transition: opacity .15s, transform .1s;
}
.save-btn:active { opacity: .85; transform: scale(.98); }

/* ── 자산 뷰 ── */
.asset-type-section { margin-bottom: 16px; }
.asset-type-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
}
.asset-type-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.asset-type-name { font-size: 13px; font-weight: 700; }
.asset-type-total { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600; color: var(--income); }

.asset-item {
  background: var(--card); border-radius: 12px; padding: 12px 14px;
  border: 1px solid var(--border); margin-bottom: 6px;
  display: flex; align-items: center; gap: 10px;
}
.asset-info { flex: 1; min-width: 0; }
.asset-name { font-size: 14px; font-weight: 600; }
.asset-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }
.asset-values { text-align: right; }
.asset-cur  { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 700; }
.asset-pnl  { font-size: 11px; margin-top: 2px; font-family: 'DM Mono', monospace; }
.asset-pnl.pos { color: var(--income); }
.asset-pnl.neg { color: var(--expense); }

/* ── 대시보드 ── */
.dash-section { margin-bottom: 20px; }
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.dash-card {
  background: var(--card); border-radius: 14px; padding: 14px;
  border: 1px solid var(--border);
}
.dash-card.wide { grid-column: 1/-1; }
.dash-card-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; font-weight: 600; letter-spacing: .3px; }
.dash-card-value { font-size: 20px; font-weight: 700; font-family: 'DM Mono', monospace; }

/* ── 구분선 ── */
.divider { height: 1px; background: var(--border); margin: 14px 0; }

/* ── 프로그레스 바 ── */
.progress-wrap { margin-top: 8px; }
.progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }

/* ── 빈 상태 ── */
.empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 14px; line-height: 1.6; }

/* ── 하단 탭바 고정 ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--bg); border-top: 1px solid var(--border);
  padding-bottom: var(--safe);
}

/* ── 토스트 ── */
.toast {
  position: fixed; top: calc(env(safe-area-inset-top,0px) + 70px);
  left: 50%; transform: translateX(-50%) translateY(-10px);
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 10px 20px; font-size: 13px; font-weight: 600;
  z-index: 300; opacity: 0; transition: all .3s; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── 날짜 구분 ── */
.date-divider {
  font-size: 11px; font-weight: 700; color: var(--muted);
  letter-spacing: .5px; padding: 6px 0 4px;
  display: flex; align-items: center; gap: 8px;
}
.date-divider::after { content:''; flex:1; height:1px; background: var(--border); }

/* select arrow */
.select-wrap { position: relative; }
.select-wrap::after {
  content: '▾'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  color: var(--muted); pointer-events: none; font-size: 12px;
}
</style>
</head>
<body>

<!-- 상단 헤더 -->
<header class="app-header">
  <div class="header-inner">
    <div class="app-title">🏦 찬진 가계부</div>
    <div class="month-nav">
      <button class="month-btn" onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="monthLabel"></span>
      <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <nav class="tab-bar">
    <button class="tab-item active" onclick="switchTab('home',this)">
      <span class="tab-icon">🏠</span>홈
    </button>
    <button class="tab-item" onclick="switchTab('tx',this)">
      <span class="tab-icon">📋</span>거래
    </button>
    <button class="tab-item" onclick="switchTab('asset',this)">
      <span class="tab-icon">💰</span>자산
    </button>
    <button class="tab-item" onclick="switchTab('dash',this)">
      <span class="tab-icon">📊</span>대시보드
    </button>
  </nav>
</header>

<div class="scroll-area">

  <!-- ═══ 홈 뷰 ═══ -->
  <div id="view-home" class="view active">
    <!-- 이번달 요약 -->
    <div class="summary-row">
      <div class="sum-card">
        <div class="sum-label">수입</div>
        <div class="sum-value income" id="h-income">₩0</div>
      </div>
      <div class="sum-card">
        <div class="sum-label">지출</div>
        <div class="sum-value expense" id="h-expense">₩0</div>
      </div>
      <div class="sum-card full">
        <div class="sum-label">잔액</div>
        <div class="sum-value balance" id="h-balance">₩0</div>
        <div class="sum-sub" id="h-saving"></div>
      </div>
    </div>

    <!-- 지출자별 -->
    <div class="owner-row">
      <div class="owner-card wife">
        <div class="owner-name">👩 와이프</div>
        <div class="owner-amount" id="h-wife">₩0</div>
      </div>
      <div class="owner-card husb">
        <div class="owner-name">👨 남편</div>
        <div class="owner-amount" id="h-husb">₩0</div>
      </div>
      <div class="owner-card joint">
        <div class="owner-name">🤝 공동</div>
        <div class="owner-amount" id="h-joint">₩0</div>
      </div>
    </div>

    <div class="section-title">최근 거래</div>
    <div class="tx-list" id="home-tx-list"></div>
  </div>

  <!-- ═══ 거래 뷰 ═══ -->
  <div id="view-tx" class="view">
    <div class="section-title">이번달 거래내역</div>
    <div class="tx-list" id="tx-list"></div>
  </div>

  <!-- ═══ 자산 뷰 ═══ -->
  <div id="view-asset" class="view">
    <div class="summary-row">
      <div class="sum-card">
        <div class="sum-label">총 자산</div>
        <div class="sum-value income" id="a-total">₩0</div>
      </div>
      <div class="sum-card">
        <div class="sum-label">총 손익</div>
        <div class="sum-value" id="a-pnl">₩0</div>
      </div>
    </div>
    <!-- 보유자별 -->
    <div class="owner-row">
      <div class="owner-card wife">
        <div class="owner-name">👩 와이프</div>
        <div class="owner-amount" id="a-wife">₩0</div>
      </div>
      <div class="owner-card husb">
        <div class="owner-name">👨 남편</div>
        <div class="owner-amount" id="a-husb">₩0</div>
      </div>
      <div class="owner-card joint">
        <div class="owner-name">🤝 공동</div>
        <div class="owner-amount" id="a-joint">₩0</div>
      </div>
    </div>
    <div id="asset-sections"></div>
  </div>

  <!-- ═══ 대시보드 뷰 ═══ -->
  <div id="view-dash" class="view">
    <div class="dash-section">
      <div class="section-title">지출자별 분석</div>
      <div class="dash-grid">
        <div class="dash-card" style="border-top:2px solid var(--wife)">
          <div class="dash-card-label">👩 와이프 지출</div>
          <div class="dash-card-value" id="d-wife-exp" style="color:var(--wife)">₩0</div>
        </div>
        <div class="dash-card" style="border-top:2px solid var(--husb)">
          <div class="dash-card-label">👨 남편 지출</div>
          <div class="dash-card-value" id="d-husb-exp" style="color:var(--husb)">₩0</div>
        </div>
        <div class="dash-card wide" style="border-top:2px solid var(--joint)">
          <div class="dash-card-label">🤝 공동 지출</div>
          <div class="dash-card-value" id="d-joint-exp" style="color:var(--joint)">₩0</div>
        </div>
      </div>
    </div>

    <div class="dash-section">
      <div class="section-title">카테고리별 지출</div>
      <div id="cat-breakdown"></div>
    </div>

      <button class="owner-btn husb"        data-owner="남편"   onclick="selectAssetOwner('남편')">👨 남편</button>
      <button class="owner-btn joint"       data-owner="공동"   onclick="selectAssetOwner('공동')">🤝 공동</button>
    </div>

    <div class="form-group">
      <label class="form-label">메모</label>
      <input class="form-input" id="a-memo" type="text" placeholder="예: 100주, 0.035 BTC">

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
// 데이터 레이어 (localStorage)
// ══════════════════════════════════════════════
const DB = {
  get: (k, def=[]) => { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } },
  set: (k, v)      => localStorage.setItem(k, JSON.stringify(v)),
};

let txList    = DB.get('kakeibo_tx',    []);
let assetList = DB.get('kakeibo_asset', []);

function saveTxDB()    { DB.set('kakeibo_tx',    txList); }
function saveAssetDB() { DB.set('kakeibo_asset', assetList); }

// ══════════════════════════════════════════════
// 상태
// ══════════════════════════════════════════════
const today = new Date();
let curYear  = today.getFullYear();
let curMonth = today.getMonth(); // 0-indexed

let selType   = 'income';
let selOwner  = '와이프';
let selAssetOwner = '와이프';
let selCat    = '';

// ══════════════════════════════════════════════
// 카테고리 정의
// ══════════════════════════════════════════════
const CATS = {
  income:   [
    {id:'급여',   emoji:'💼'}, {id:'부업',   emoji:'💻'},
    {id:'이자',   emoji:'🏦'}, {id:'기타수입',emoji:'✨'},
  ],
  fixed:    [
    {id:'주거비', emoji:'🏠'}, {id:'통신비', emoji:'📱'},
    {id:'보험',   emoji:'🛡️'}, {id:'구독',   emoji:'📺'},
    {id:'교육비', emoji:'📚'}, {id:'교통정기',emoji:'🚇'},
  ],
  variable: [
    {id:'식비',   emoji:'🛒'}, {id:'외식',   emoji:'🍽️'},
    {id:'카페',   emoji:'☕'}, {id:'교통',   emoji:'🚌'},
    {id:'쇼핑',   emoji:'🛍️'}, {id:'의료',   emoji:'💊'},
    {id:'여가',   emoji:'🎮'}, {id:'기타',   emoji:'📦'},
  ],
};

const CAT_EMOJI = {};
Object.values(CATS).flat().forEach(c => CAT_EMOJI[c.id] = c.emoji);

const ASSET_COLORS = {
  '예·적금':'#3b82f6','주식':'#22c55e','코인':'#f97316',
  '부동산':'#a855f7','현금':'#94a3b8','달러(USD)':'#34d399','기타자산':'#64748b',
};

// ══════════════════════════════════════════════
// 탭 & 월 네비
// ══════════════════════════════════════════════
function switchTab(name, el) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  el.classList.add('active');

  // 자산 탭에서 FAB 변경
  const fab = document.querySelector('.fab');
  if (name === 'asset') {
    fab.onclick = () => openModal('asset');
    fab.title = '자산 추가';
  } else {
    fab.onclick = () => openModal('tx');
    fab.title = '거래 추가';
  }
  render();
}

function changeMonth(d) {
  curMonth += d;
  if (curMonth < 0)  { curMonth = 11; curYear--; }
  if (curMonth > 11) { curMonth = 0;  curYear++; }
  updateMonthLabel();
  render();
}

function updateMonthLabel() {
  document.getElementById('monthLabel').textContent =
    `${curYear}.${String(curMonth+1).padStart(2,'0')}`;
}

// ══════════════════════════════════════════════
// 필터링
// ══════════════════════════════════════════════
function monthTx() {
  return txList.filter(t => {
    const d = new Date(t.date);
    return d.getFullYear()===curYear && d.getMonth()===curMonth;
  });
}

// ══════════════════════════════════════════════
// 숫자 포맷
// ══════════════════════════════════════════════
const won = n => '₩' + Math.abs(Math.round(n)).toLocaleString('ko-KR');
const compact = n => {
  const a = Math.abs(n);
  if (a >= 100000000) return (n/100000000).toFixed(1) + '억';
  if (a >= 10000)     return (n/10000).toFixed(0) + '만';
  return n.toLocaleString('ko-KR');
};

// ══════════════════════════════════════════════
// 렌더링 — 홈
// ══════════════════════════════════════════════
function renderHome() {
  const txs = monthTx();
  const income  = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = txs.filter(t=>t.type!=='income').reduce((s,t)=>s+t.amount,0);
  const balance = income - expense;

  document.getElementById('h-income').textContent  = won(income);
  document.getElementById('h-expense').textContent = won(expense);
  document.getElementById('h-balance').textContent = won(balance);
  document.getElementById('h-balance').style.color =
    balance >= 0 ? 'var(--income)' : 'var(--expense)';

  const saveRate = income > 0 ? ((balance/income)*100).toFixed(1) : 0;
  document.getElementById('h-saving').textContent = `저축률 ${saveRate}%`;

  ['와이프','남편','공동'].forEach((o,i) => {
    const id = ['h-wife','h-husb','h-joint'][i];
    const amt = txs.filter(t=>t.owner===o && t.type!=='income').reduce((s,t)=>s+t.amount,0);
    document.getElementById(id).textContent = compact(amt);
  });

  const recent = [...txs].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  const el = document.getElementById('home-tx-list');
  el.innerHTML = recent.length ? recent.map(txHTML).join('') : emptyHTML('최근 거래가 없어요');
}

// ══════════════════════════════════════════════
// 렌더링 — 거래목록
// ══════════════════════════════════════════════
function renderTxList() {
  const txs = [...monthTx()].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const el  = document.getElementById('tx-list');
  if (!txs.length) { el.innerHTML = emptyHTML('이번 달 거래가 없어요\n아래 + 버튼을 눌러 추가하세요'); return; }

  // 날짜별 그룹
  const groups = {};
  txs.forEach(t => { (groups[t.date]??=[]).push(t); });

  el.innerHTML = Object.entries(groups).sort(([a],[b])=>b.localeCompare(a))
    .map(([date, list]) => {
      const d = new Date(date);
      const label = `${d.getMonth()+1}월 ${d.getDate()}일 (${['일','월','화','수','목','금','토'][d.getDay()]})`;
      return `<div class="date-divider">${label}</div>` + list.map(txHTML).join('');
    }).join('');
}

function txHTML(t) {
  const isIncome = t.type === 'income';
  const typeBadge = t.type === 'income'   ? '<span class="type-badge income-t">수입</span>'
                  : t.type === 'fixed'    ? '<span class="type-badge fixed">고정</span>'
                  : '<span class="type-badge variable">변동</span>';
  const ownerClass = t.owner === '와이프' ? 'wife' : t.owner === '남편' ? 'husb' : 'joint';
  const emoji = CAT_EMOJI[t.cat] || '💸';
  return `
  <div class="tx-item ${ownerClass}" data-id="${t.id}">
    <div class="tx-icon">${emoji}</div>
    <div class="tx-info">
      <div class="tx-name">${t.name}</div>
      <div class="tx-meta">
        <span class="owner-badge ${ownerClass}">${t.owner}</span>
        ${typeBadge}
        <span>${t.account||''}</span>
      </div>
    </div>
    <div class="tx-amount ${isIncome?'income':'expense'}">
      ${isIncome?'+':'-'}${won(t.amount)}
    </div>
    <button class="tx-delete" onclick="deleteTx('${t.id}',event)">✕</button>
  </div>`;
}

// ══════════════════════════════════════════════
// 렌더링 — 자산
// ══════════════════════════════════════════════
function renderAsset() {
  const total  = assetList.reduce((s,a)=>s+a.cur,0);
  const totBuy = assetList.reduce((s,a)=>s+a.buy,0);
  const pnl    = total - totBuy;

  document.getElementById('a-total').textContent = won(total);
  const pnlEl = document.getElementById('a-pnl');
  pnlEl.textContent = (pnl>=0?'+':'')+won(pnl);
  pnlEl.style.color = pnl>=0?'var(--income)':'var(--expense)';

  ['와이프','남편','공동'].forEach((o,i) => {
    const id = ['a-wife','a-husb','a-joint'][i];
    const amt = assetList.filter(a=>a.owner===o).reduce((s,a)=>s+a.cur,0);
    document.getElementById(id).textContent = compact(amt);
  });

  // 유형별 섹션
  const types = [...new Set(assetList.map(a=>a.type))];
  const sec = document.getElementById('asset-sections');

  if (!assetList.length) { sec.innerHTML = emptyHTML('자산을 추가해보세요'); return; }

  sec.innerHTML = types.map(type => {
    const items = assetList.filter(a=>a.type===type);
    const typeTotal = items.reduce((s,a)=>s+a.cur,0);
    const color = ASSET_COLORS[type] || '#94a3b8';
    return `
    <div class="asset-type-section">
      <div class="asset-type-header">
        <div class="asset-type-dot" style="background:${color}"></div>
        <div class="asset-type-name">${type}</div>
        <div class="asset-type-total">${won(typeTotal)}</div>
      </div>
      ${items.map(a => {
        const pnl  = a.cur - a.buy;
        const rate = a.buy > 0 ? ((pnl/a.buy)*100).toFixed(1) : 0;
        const ownerClass = a.owner==='와이프'?'wife':a.owner==='남편'?'husb':'joint';
        return `
        <div class="asset-item">
          <div class="asset-info">
            <div class="asset-name">${a.name}</div>
            <div class="asset-sub">
              <span class="owner-badge ${ownerClass}">${a.owner}</span>
              ${a.inst ? `· ${a.inst}` : ''}
              ${a.memo ? `· ${a.memo}` : ''}
            </div>
          </div>
          <div class="asset-values">
            <div class="asset-cur" style="color:${color}">${won(a.cur)}</div>
            <div class="asset-pnl ${pnl>=0?'pos':'neg'}">
              ${pnl>=0?'+':''}${won(pnl)} (${rate}%)
            </div>
          </div>
          <button class="tx-delete" onclick="deleteAsset('${a.id}',event)" style="margin-left:6px">✕</button>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════
// 렌더링 — 대시보드
// ══════════════════════════════════════════════
function renderDash() {
  const txs = monthTx();

  ['와이프','남편','공동'].forEach((o,i) => {
    const id  = ['d-wife-exp','d-husb-exp','d-joint-exp'][i];
    const amt = txs.filter(t=>t.owner===o && t.type!=='income').reduce((s,t)=>s+t.amount,0);
    document.getElementById(id).textContent = won(amt);
  });

  const fixedAmt    = txs.filter(t=>t.type==='fixed').reduce((s,t)=>s+t.amount,0);
  const variableAmt = txs.filter(t=>t.type==='variable').reduce((s,t)=>s+t.amount,0);
  document.getElementById('d-fixed').textContent    = won(fixedAmt);
  document.getElementById('d-variable').textContent = won(variableAmt);

  // 카테고리 브레이크다운
  const catMap = {};
  txs.filter(t=>t.type!=='income').forEach(t => {
    catMap[t.cat] = (catMap[t.cat]||0) + t.amount;
  });
  const totalExp = Object.values(catMap).reduce((s,v)=>s+v,0);
  const sorted   = Object.entries(catMap).sort(([,a],[,b])=>b-a);
  const catEl    = document.getElementById('cat-breakdown');
  catEl.innerHTML = sorted.length ? sorted.map(([cat, amt]) => {
    const pct = totalExp > 0 ? (amt/totalExp*100).toFixed(0) : 0;
    const colors = ['#f472b6','#60a5fa','#a78bfa','#34d399','#fbbf24','#f97316','#94a3b8'];
    const color  = colors[sorted.findIndex(([c])=>c===cat) % colors.length];
    return `
    <div class="progress-wrap" style="margin-bottom:10px">
      <div class="progress-label">
        <span>${CAT_EMOJI[cat]||'📦'} ${cat}</span>
        <span>${won(amt)} (${pct}%)</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%;background:${color}"></div>
      </div>
    </div>`;
  }).join('') : '<div style="color:var(--muted);font-size:13px;padding:8px 0">지출 내역이 없어요</div>';

  // 보유자별 자산
  ['와이프','남편','공동'].forEach((o,i) => {
    const id  = ['d-wife-asset','d-husb-asset','d-joint-asset'][i];
    const amt = assetList.filter(a=>a.owner===o).reduce((s,a)=>s+a.cur,0);
    document.getElementById(id).textContent = won(amt);
  });
}

// ══════════════════════════════════════════════
// 전체 렌더
// ══════════════════════════════════════════════
function render() {
  renderHome();
  renderTxList();
  renderAsset();
  renderDash();
}

// ══════════════════════════════════════════════
// 모달
// ══════════════════════════════════════════════
function openModal(type) {
  if (type === 'tx') {
    // 날짜 기본값
    const d = new Date();
    document.getElementById('tx-date').value =
      `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    document.getElementById('tx-amount').value = '';
    document.getElementById('tx-name').value   = '';
    document.getElementById('tx-memo').value   = '';
    document.getElementById('amount-display').textContent = '₩0';
    selectType('income');
    selectOwner('와이프');
    document.getElementById('modal-tx').classList.add('open');
  } else {
    document.getElementById('a-buy').value  = '';
    document.getElementById('a-cur').value  = '';
    document.getElementById('a-name').value = '';
    document.getElementById('a-inst').value = '';
    document.getElementById('a-memo').value = '';
    selectAssetOwner('와이프');
    document.getElementById('modal-asset').classList.add('open');
  }
}

function closeModalOnBack(e, id) {
  if (e.target.classList.contains('modal-backdrop'))
    document.getElementById(id).classList.remove('open');
}

// ══════════════════════════════════════════════
// 유형 선택
// ══════════════════════════════════════════════
function selectType(type) {
  selType = type;
  document.querySelectorAll('#type-toggle .toggle-btn').forEach(b => {
    b.classList.remove('active');
    if (b.dataset.type === type) b.classList.add('active');
  });
  // 카테고리 재렌더
  renderCatGrid();
}

function renderCatGrid() {
  const cats = CATS[selType] || [];
  selCat = cats[0]?.id || '';
  document.getElementById('cat-grid').innerHTML = cats.map(c =>
    `<button class="cat-btn${c.id===selCat?' active':''}" data-cat="${c.id}" onclick="selectCat('${c.id}')">
      <span class="cat-emoji">${c.emoji}</span>${c.id}
    </button>`
  ).join('');
}

function selectCat(id) {
  selCat = id;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat===id);
  });
}

// ══════════════════════════════════════════════
// 소유자 선택
// ══════════════════════════════════════════════
function selectOwner(o) {
  selOwner = o;
  document.querySelectorAll('#owner-select .owner-btn').forEach(b => {
    b.classList.remove('active');
    if (b.dataset.owner===o) b.classList.add('active');
  });
}

function selectAssetOwner(o) {
  selAssetOwner = o;
  document.querySelectorAll('#asset-owner-select .owner-btn').forEach(b => {
    b.classList.remove('active');
    if (b.dataset.owner===o) b.classList.add('active');
  });
}

// ══════════════════════════════════════════════
// 금액 표시
// ══════════════════════════════════════════════
function updateAmountDisplay() {
  const v = parseFloat(document.getElementById('tx-amount').value)||0;
  document.getElementById('amount-display').textContent =
    v > 0 ? '₩' + v.toLocaleString('ko-KR') : '₩0';
}

// ══════════════════════════════════════════════
// 저장 — 거래
// ══════════════════════════════════════════════
function saveTx() {
  const amount  = parseFloat(document.getElementById('tx-amount').value);
  const name    = document.getElementById('tx-name').value.trim();
  const account = document.getElementById('tx-account').value;
  const date    = document.getElementById('tx-date').value;
  const memo    = document.getElementById('tx-memo').value.trim();

  if (!amount || amount <= 0) { showToast('금액을 입력해주세요 💸'); return; }
  if (!name)                  { showToast('내용을 입력해주세요 ✏️'); return; }

  txList.push({
    id: Date.now().toString(),
    type: selType, name, amount, cat: selCat,
    account, owner: selOwner, date, memo,
  });
  saveTxDB();
  document.getElementById('modal-tx').classList.remove('open');
  showToast('✅ 저장됐어요!');
  render();
}

// ══════════════════════════════════════════════
// 저장 — 자산
// ══════════════════════════════════════════════
function saveAsset() {
  const name = document.getElementById('a-name').value.trim();
  const buy  = parseFloat(document.getElementById('a-buy').value)||0;
  const cur  = parseFloat(document.getElementById('a-cur').value)||0;
  const inst = document.getElementById('a-inst').value.trim();
  const memo = document.getElementById('a-memo').value.trim();
  const type = document.getElementById('a-type').value;

  if (!name) { showToast('항목명을 입력해주세요 ✏️'); return; }
  if (cur <= 0) { showToast('현재가를 입력해주세요 💰'); return; }

  assetList.push({
    id: Date.now().toString(),
    type, name, inst, buy, cur, owner: selAssetOwner, memo,
  });
  saveAssetDB();
  document.getElementById('modal-asset').classList.remove('open');
  showToast('✅ 자산이 추가됐어요!');
  render();
}

// ══════════════════════════════════════════════
// 삭제
// ══════════════════════════════════════════════
function deleteTx(id, e) {
  e.stopPropagation();
  if (!confirm('이 거래를 삭제할까요?')) return;
  txList = txList.filter(t=>t.id!==id);
  saveTxDB(); showToast('🗑️ 삭제됐어요'); render();
}

function deleteAsset(id, e) {
  e.stopPropagation();
  if (!confirm('이 자산을 삭제할까요?')) return;
  assetList = assetList.filter(a=>a.id!==id);
  saveAssetDB(); showToast('🗑️ 삭제됐어요'); render();
}

// ══════════════════════════════════════════════
// 토스트
// ══════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ══════════════════════════════════════════════
// 빈 상태 HTML
// ══════════════════════════════════════════════
function emptyHTML(msg) {
  return `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">${msg}</div></div>`;
}

// ══════════════════════════════════════════════
// 초기화
// ══════════════════════════════════════════════
updateMonthLabel();
renderCatGrid();
render();

// PWA 서비스워커 등록
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
