<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="가계부">
<meta name="theme-color" content="#0a0a0f">
<title>찬진 가계부</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --surface:#12121a; --card:#1a1a26; --border:#2a2a3e;
  --text:#e8e8f0; --muted:#5a5a7a;
  --wife:#f472b6; --wife-d:#2d1020;
  --husb:#60a5fa; --husb-d:#0f1f35;
  --joint:#a78bfa; --joint-d:#1e1030;
  --income:#34d399; --expense:#f87171; --fixed:#fbbf24;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:15px;overscroll-behavior:none;min-height:100dvh;}
.app{width:100%;min-height:100dvh;position:relative;}

/* ── 헤더 ── */
.hdr{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);width:100%;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top,12px) 16px 8px;}
.logo{font-size:15px;font-weight:900;background:linear-gradient(135deg,var(--wife),var(--husb));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.mnav{display:flex;align-items:center;gap:6px;}
.mbtn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;width:28px;height:28px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mlbl{font-size:13px;font-weight:700;min-width:56px;text-align:center;font-family:'DM Mono',monospace;}
.sync-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;gap:4px;}
.sync-btn.linked{border-color:var(--income);color:var(--income);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

/* ── 탭 ── */
.tabs{display:flex;padding:0 8px 8px;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border:none;background:none;color:var(--muted);font-size:11px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;border-radius:10px;border-bottom:2px solid transparent;transition:all .15s;}
.tab.on{color:var(--wife);border-bottom-color:var(--wife);}
.tab-ico{font-size:22px;line-height:1;}

/* ── 스크롤 영역 ── */
.scroll{padding:12px 16px 88px;}

/* ── 요약 카드 ── */
.srow{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;}
.scard{background:var(--card);border-radius:16px;padding:13px 15px;border:1px solid var(--border);}
.scard.full{grid-column:1/-1;}
.slbl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.3px;margin-bottom:4px;}
.sval{font-size:24px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-1px;}
.ssub{font-size:10px;color:var(--muted);margin-top:4px;}

/* ── 지출자 카드 ── */
.orow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:13px;}
.ocard{border-radius:13px;padding:10px 6px;text-align:center;border:1.5px solid;}
.ocard.wife{background:var(--wife-d);border-color:var(--wife);}
.ocard.husb{background:var(--husb-d);border-color:var(--husb);}
.ocard.joint{background:var(--joint-d);border-color:var(--joint);}
.onm{font-size:10px;font-weight:800;margin-bottom:4px;}
.ocard.wife .onm{color:var(--wife);}
.ocard.husb .onm{color:var(--husb);}
.ocard.joint .onm{color:var(--joint);}
.oamt{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;}

/* ── 섹션 타이틀 ── */
.stitle{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin:14px 0 8px;}

/* ── 거래 아이템 ── */
.txlist{display:flex;flex-direction:column;gap:5px;}
.txitem{background:var(--card);border-radius:13px;padding:10px 11px;border:1px solid var(--border);display:flex;align-items:center;gap:9px;position:relative;overflow:hidden;}
.txitem.wife{border-left:3px solid var(--wife);}
.txitem.husb{border-left:3px solid var(--husb);}
.txitem.joint{border-left:3px solid var(--joint);}
.txico{width:34px;height:34px;border-radius:10px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.txinfo{flex:1;min-width:0;}
.txname{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.txmeta{font-size:10px;color:var(--muted);margin-top:2px;display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.badge{font-size:9px;font-weight:800;padding:1px 6px;border-radius:20px;}
.badge.wife{background:var(--wife-d);color:var(--wife);}
.badge.husb{background:var(--husb-d);color:var(--husb);}
.badge.joint{background:var(--joint-d);color:var(--joint);}
.tbadge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;}
.tbadge.income{background:rgba(52,211,153,.12);color:var(--income);}
.tbadge.fixed{background:rgba(251,191,36,.12);color:var(--fixed);}
.tbadge.variable{background:rgba(248,113,113,.1);color:var(--expense);}
.txamt{font-family:'DM Mono',monospace;font-size:14px;font-weight:700;text-align:right;white-space:nowrap;}
.txamt.inc{color:var(--income);}
.txamt.exp{color:var(--expense);}
.delbtn{width:24px;height:24px;border-radius:7px;background:rgba(248,113,113,.08);border:none;color:var(--expense);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ddiv{font-size:10px;font-weight:800;color:var(--muted);padding:8px 0 4px;display:flex;align-items:center;gap:8px;}
.ddiv::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── 자산 ── */
.asec{margin-bottom:15px;}
.asec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.adot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.atnm{font-size:13px;font-weight:800;}
.attot{margin-left:auto;font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--income);}
.aitem{background:var(--card);border-radius:12px;padding:10px 12px;border:1px solid var(--border);margin-bottom:5px;display:flex;align-items:center;gap:9px;}
.ainf{flex:1;min-width:0;}
.anm{font-size:14px;font-weight:600;}
.asub{font-size:10px;color:var(--muted);margin-top:2px;display:flex;gap:5px;align-items:center;}
.avals{text-align:right;}
.acur{font-family:'DM Mono',monospace;font-size:14px;font-weight:700;}
.apnl{font-size:10px;margin-top:2px;font-family:'DM Mono',monospace;}
.apnl.pos{color:var(--income);}
.apnl.neg{color:var(--expense);}

/* ── 대시보드 ── */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.dcard{background:var(--card);border-radius:13px;padding:13px;border:1px solid var(--border);}
.dcard.wide{grid-column:1/-1;}
.dlbl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.3px;margin-bottom:6px;}
.dval{font-size:22px;font-weight:800;font-family:'DM Mono',monospace;}
.pbar-wrap{margin-bottom:10px;}
.pbar-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px;}
.pbar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.pfill{height:100%;border-radius:3px;transition:width .4s;}

/* ── FAB ── */
.fab{position:fixed;right:20px;bottom:24px;width:58px;height:58px;border-radius:18px;background:linear-gradient(135deg,var(--wife),#a855f7);border:none;color:#fff;font-size:26px;box-shadow:0 5px 18px rgba(244,114,182,.4);cursor:pointer;z-index:40;display:flex;align-items:center;justify-content:center;transition:transform .12s;}
.fab:active{transform:scale(.92);}


/* ── 모달 ── */
.mback{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:100;display:none;align-items:flex-end;justify-content:center;}
.mback.open{display:flex;}
.mbox{width:100%;background:var(--surface);border-radius:24px 24px 0 0;padding:0 16px 32px;border:1px solid var(--border);border-bottom:none;max-height:93dvh;overflow-y:auto;animation:slideUp .25s cubic-bezier(.16,1,.3,1);}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.mhandle{width:32px;height:4px;background:var(--border);border-radius:2px;margin:11px auto 16px;}
.mtitle{font-size:18px;font-weight:800;margin-bottom:16px;letter-spacing:-.5px;}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-hdr .mtitle{margin-bottom:0;}
.close-btn{width:32px;height:32px;border-radius:10px;background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.flbl{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.5px;display:block;margin-bottom:6px;}
.finp,.fsel{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:11px 13px;color:var(--text);font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;margin-bottom:11px;appearance:none;-webkit-appearance:none;transition:border-color .15s;}
.finp:focus,.fsel:focus{border-color:var(--wife);}
.finp.big{font-family:'DM Mono',monospace;font-size:24px;font-weight:700;text-align:right;}
.adisplay{text-align:right;font-size:10px;color:var(--muted);margin-top:-9px;margin-bottom:10px;}
.selwrap{position:relative;margin-bottom:11px;}
.selwrap .fsel{margin-bottom:0;}
.selwrap::after{content:'▾';position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.trow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:13px;}
.tbtn{padding:9px 4px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-size:10px;font-weight:800;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-align:center;transition:all .12s;}
.tbtn.on.inc{border-color:var(--income);background:rgba(52,211,153,.1);color:var(--income);}
.tbtn.on.fix{border-color:var(--fixed);background:rgba(251,191,36,.1);color:var(--fixed);}
.tbtn.on.var{border-color:var(--expense);background:rgba(248,113,113,.1);color:var(--expense);}
.osel{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:13px;}
.obtn{padding:9px 4px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-size:10px;font-weight:800;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .12s;}
.obtn.on.wife{border-color:var(--wife);background:var(--wife-d);color:var(--wife);}
.obtn.on.husb{border-color:var(--husb);background:var(--husb-d);color:var(--husb);}
.obtn.on.joint{border-color:var(--joint);background:var(--joint-d);color:var(--joint);}
.cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:13px;}
.cbtn{padding:7px 3px;border-radius:9px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-size:10px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .12s;}
.cbtn .ce{font-size:17px;}
.cbtn.on{border-color:var(--wife);background:rgba(244,114,182,.1);color:var(--wife);}
.savebtn{width:100%;padding:14px;border-radius:13px;border:none;background:linear-gradient(135deg,var(--wife),#a855f7);color:#fff;font-size:15px;font-weight:800;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:6px;box-shadow:0 5px 18px rgba(244,114,182,.3);transition:opacity .12s,transform .1s;}
.savebtn:active{opacity:.85;transform:scale(.98);}

/* ── 공유 모달 ── */
.share-section{margin-bottom:20px;}
.share-section-title{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;}
.code-display{background:var(--card);border:2px solid var(--wife);border-radius:16px;padding:20px;text-align:center;margin-bottom:10px;}
.code-text{font-family:'DM Mono',monospace;font-size:32px;font-weight:700;color:var(--wife);letter-spacing:6px;}
.code-hint{font-size:11px;color:var(--muted);margin-top:6px;}
.copy-btn{width:100%;padding:12px;border-radius:12px;border:1.5px solid var(--wife);background:transparent;color:var(--wife);font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-bottom:20px;}
.divider{height:1px;background:var(--border);margin:20px 0;}
.join-row{display:flex;gap:8px;}
.join-input{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:11px 13px;color:var(--text);font-size:16px;font-family:'DM Mono',monospace;font-weight:700;letter-spacing:3px;outline:none;text-transform:uppercase;}
.join-input:focus{border-color:var(--husb);}
.join-btn{padding:11px 16px;border-radius:12px;border:none;background:var(--husb);color:#fff;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;}
.sync-status{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--border);text-align:center;}
.sync-status.linked{border-color:var(--income);}
.sync-status-icon{font-size:28px;margin-bottom:6px;}
.sync-status-text{font-size:13px;font-weight:700;}
.sync-status-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.unlink-btn{margin-top:12px;padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}

/* ── 싱크 인디케이터 ── */
.syncing{position:fixed;top:70px;right:16px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:11px;font-weight:700;color:var(--income);z-index:200;display:none;align-items:center;gap:6px;}
.syncing.show{display:flex;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{display:inline-block;animation:spin 1s linear infinite;}

/* ── 빈 상태 ── */
.empty{text-align:center;padding:40px 14px;color:var(--muted);}
.emico{font-size:40px;margin-bottom:10px;}
.emtxt{font-size:13px;line-height:1.7;white-space:pre-line;}

/* ── 토스트 ── */
.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--card);border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-size:13px;font-weight:700;z-index:200;opacity:0;transition:all .25s;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.4);pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">

  <!-- 헤더 -->
  <header class="hdr">
    <div class="hdr-top">
      <div class="logo">🏦 찬진 가계부</div>
      <div class="hdr-right">
        <div class="mnav">
          <button class="mbtn" onclick="changeMonth(-1)">‹</button>
          <span class="mlbl" id="mlbl"></span>
          <button class="mbtn" onclick="changeMonth(1)">›</button>
        </div>
        <button class="sync-btn" id="sync-btn" onclick="openModal('share')">
          <span class="sync-dot"></span><span id="sync-label">공유</span>
        </button>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab on" onclick="switchTab('home',this)"><span class="tab-ico">🏠</span>홈</button>
      <button class="tab"    onclick="switchTab('tx',this)"><span class="tab-ico">📋</span>거래</button>
      <button class="tab"    onclick="switchTab('asset',this)"><span class="tab-ico">💰</span>자산</button>
      <button class="tab"    onclick="switchTab('dash',this)"><span class="tab-ico">📊</span>대시보드</button>
    </nav>
  </header>

  <!-- 뷰 -->
  <div class="scroll">
    <div id="view-home" class="view"></div>
    <div id="view-tx"   class="view" style="display:none"></div>
    <div id="view-asset" class="view" style="display:none"></div>
    <div id="view-dash" class="view" style="display:none"></div>
  </div>

</div><!-- /app -->

<!-- FAB -->
<button class="fab" id="fab" onclick="openFab()">＋</button>

<!-- 싱크 인디케이터 -->
<div class="syncing" id="syncing"><span class="spin">⟳</span> 동기화 중...</div>

<!-- 거래 모달 -->
<div class="mback" id="modal-tx" onclick="closeOnBack(event,'modal-tx')">
  <div class="mbox">
    <div class="mhandle"></div>
    <div class="modal-hdr"><div class="mtitle">거래 추가</div><button class="close-btn" onclick="document.getElementById('modal-tx').classList.remove('open')">✕</button></div>
    <label class="flbl">거래 유형</label>
    <div class="trow">
      <button class="tbtn on inc" data-type="income"   onclick="selType('income',this)">💚 수입</button>
      <button class="tbtn fix"    data-type="fixed"    onclick="selType('fixed',this)">📌 고정</button>
      <button class="tbtn var"    data-type="variable" onclick="selType('variable',this)">📈 변동</button>
    </div>
    <label class="flbl">금액</label>
    <input class="finp big" id="tx-amt" type="number" inputmode="numeric" placeholder="0" oninput="updAmt()">
    <div class="adisplay" id="amt-disp">₩0</div>
    <label class="flbl">내용</label>
    <input class="finp" id="tx-name" type="text" placeholder="예: 마트 장보기">
    <label class="flbl">카테고리</label>
    <div class="cgrid" id="cat-grid"></div>
    <label class="flbl">계좌 / 카드</label>
    <div class="selwrap">
      <select class="fsel" id="tx-acct">
        <option>국민은행</option><option>카카오뱅크</option><option>토스뱅크</option>
        <option>삼성카드</option><option>신한카드</option><option>현대카드</option>
        <option>롯데카드</option><option>기타</option>
      </select>
    </div>
    <label class="flbl">지출자 / 수령자</label>
    <div class="osel" id="owner-sel">
      <button class="obtn on wife" data-o="와이프" onclick="selOwner('와이프',this,'owner-sel')">👩 와이프</button>
      <button class="obtn husb"    data-o="남편"   onclick="selOwner('남편',this,'owner-sel')">👨 남편</button>
      <button class="obtn joint"   data-o="공동"   onclick="selOwner('공동',this,'owner-sel')">🤝 공동</button>
    </div>
    <label class="flbl">날짜</label>
    <input class="finp" id="tx-date" type="date">
    <label class="flbl">메모 (선택)</label>
    <input class="finp" id="tx-memo" type="text" placeholder="메모">
    <button class="savebtn" onclick="saveTx()">저장하기</button>
  </div>
</div>

<!-- 자산 모달 -->
<div class="mback" id="modal-asset" onclick="closeOnBack(event,'modal-asset')">
  <div class="mbox">
    <div class="mhandle"></div>
    <div class="modal-hdr"><div class="mtitle">자산 추가</div><button class="close-btn" onclick="document.getElementById('modal-asset').classList.remove('open')">✕</button></div>
    <label class="flbl">자산 유형</label>
    <div class="selwrap">
      <select class="fsel" id="a-type">
        <option>예·적금</option><option>주식</option><option>코인</option>
        <option>부동산</option><option>현금</option><option>달러(USD)</option><option>기타자산</option>
      </select>
    </div>
    <label class="flbl">항목명</label>
    <input class="finp" id="a-name" type="text" placeholder="예: KB 정기예금">
    <label class="flbl">금융기관 / 거래소</label>
    <input class="finp" id="a-inst" type="text" placeholder="예: 국민은행, 업비트">
    <label class="flbl">매입가 (₩)</label>
    <input class="finp big" id="a-buy" type="number" inputmode="numeric" placeholder="0">
    <label class="flbl">현재가 (₩)</label>
    <input class="finp big" id="a-cur" type="number" inputmode="numeric" placeholder="0">
    <label class="flbl">보유자</label>
    <div class="osel" id="aowner-sel">
      <button class="obtn on wife" data-o="와이프" onclick="selOwner('와이프',this,'aowner-sel')">👩 와이프</button>
      <button class="obtn husb"    data-o="남편"   onclick="selOwner('남편',this,'aowner-sel')">👨 남편</button>
      <button class="obtn joint"   data-o="공동"   onclick="selOwner('공동',this,'aowner-sel')">🤝 공동</button>
    </div>
    <label class="flbl">메모</label>
    <input class="finp" id="a-memo" type="text" placeholder="예: 100주, 0.035 BTC">
    <button class="savebtn" onclick="saveAsset()">저장하기</button>
  </div>
</div>

<!-- 공유 모달 -->
<div class="mback" id="modal-share" onclick="closeOnBack(event,'modal-share')">
  <div class="mbox">
    <div class="mhandle"></div>
    <div class="modal-hdr"><div class="mtitle">📡 실시간 공유</div><button class="close-btn" onclick="document.getElementById('modal-share').classList.remove('open')">✕</button></div>

    <!-- 연결 상태 -->
    <div class="sync-status" id="sync-status-box">
      <div class="sync-status-icon">🔗</div>
      <div class="sync-status-text" id="sync-status-text">연결되지 않음</div>
      <div class="sync-status-sub" id="sync-status-sub">아래에서 공유 코드를 만들거나 입력하세요</div>
    </div>

    <div class="divider"></div>

    <!-- 내 코드 -->
    <div class="share-section">
      <div class="share-section-title">내 공유 코드</div>
      <div class="code-display">
        <div class="code-text" id="my-code">----</div>
        <div class="code-hint">이 코드를 남편에게 알려주세요</div>
      </div>
      <button class="copy-btn" onclick="copyCode()">📋 코드 복사하기</button>
    </div>

    <!-- 코드 입력 -->
    <div class="share-section">
      <div class="share-section-title">상대방 코드 입력</div>
      <div class="join-row">
        <input class="join-input" id="join-code" type="text" maxlength="8" placeholder="ABCD1234" oninput="this.value=this.value.toUpperCase()">
        <button class="join-btn" onclick="joinCode()">연결</button>
      </div>
    </div>

    <button class="unlink-btn" id="unlink-btn" onclick="unlinkSync()" style="display:none;width:100%">🔌 연결 해제</button>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════
// 상수
// ════════════════════════════════════════════
const CATS = {
  income:   [{id:"급여",e:"💼"},{id:"부업",e:"💻"},{id:"이자",e:"🏦"},{id:"기타수입",e:"✨"}],
  fixed:    [{id:"주거비",e:"🏠"},{id:"통신비",e:"📱"},{id:"보험",e:"🛡️"},{id:"구독",e:"📺"},{id:"교육비",e:"📚"},{id:"교통정기",e:"🚇"}],
  variable: [{id:"식비",e:"🛒"},{id:"외식",e:"🍽️"},{id:"카페",e:"☕"},{id:"교통",e:"🚌"},{id:"쇼핑",e:"🛍️"},{id:"의료",e:"💊"},{id:"여가",e:"🎮"},{id:"기타",e:"📦"}],
};
const CAT_EMOJI = Object.fromEntries(Object.values(CATS).flat().map(c=>[c.id,c.e]));
const ASSET_COLOR = {"예·적금":"#3b82f6","주식":"#22c55e","코인":"#f97316","부동산":"#a855f7","현금":"#94a3b8","달러(USD)":"#34d399","기타자산":"#64748b"};
const ASSET_EMOJI = {"예·적금":"💳","주식":"📈","코인":"🪙","부동산":"🏠","현금":"💵","달러(USD)":"💲","기타자산":"📦"};
const OWNERS = [{id:"와이프",cls:"wife"},{id:"남편",cls:"husb"},{id:"공동",cls:"joint"}];
const OWNER_ICON = {"와이프":"👩","남편":"👨","공동":"🤝"};

// ════════════════════════════════════════════
// 상태
// ════════════════════════════════════════════
let txList   = load("kk_tx", []);
let assList  = load("kk_as", []);
let curYear  = new Date().getFullYear();
let curMonth = new Date().getMonth();
let curTab   = "home";
let selTxType  = "income";
let selTxOwner = "와이프";
let selACat    = "급여";
let selAOwner  = "와이프";

// 공유 관련
let myCode    = load("kk_mycode", null);
let pairCode  = load("kk_paircode", null);
let lastSync  = load("kk_lastsync", 0);
let syncTimer = null;

// ════════════════════════════════════════════
// 스토리지
// ════════════════════════════════════════════
function load(k, def) { try { const v=localStorage.getItem(k); return v?JSON.parse(v):def; } catch { return def; } }
function save(k, v)   { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} }
function saveAll()    { save("kk_tx",txList); save("kk_as",assList); }

// ════════════════════════════════════════════
// 공유 코드 시스템 (jsonbin.io 무료 API 사용)
// ════════════════════════════════════════════
const BIN_API = "https://api.jsonbin.io/v3/b";
// 무료 마스터 키 — 개인 프로젝트용
const BIN_KEY = "$2a$10$placeholder"; // 아래 init에서 실제 bin 생성

function genCode() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  return Array.from({length:8}, ()=>chars[Math.floor(Math.random()*chars.length)]).join("");
}

// jsonbin 대신 localStorage 기반 + BroadcastChannel 로 같은 기기 탭 동기화
// + URL 파라미터 공유 방식으로 구현
function initSync() {
  if (!myCode) {
    myCode = genCode();
    save("kk_mycode", myCode);
  }
  document.getElementById("my-code").textContent = myCode;
  updateSyncUI();

  // BroadcastChannel — 같은 origin 다른 탭과 실시간 동기화
  if (typeof BroadcastChannel !== "undefined") {
    const bc = new BroadcastChannel("kakeibo_sync");
    bc.onmessage = (e) => {
      if (e.data.type === "DATA_UPDATE" && e.data.code === (pairCode||myCode)) {
        txList  = e.data.txList;
        assList = e.data.assList;
        saveAll();
        render();
        showToast("🔄 데이터 업데이트됨!");
      }
    };
    window._bc = bc;
  }

  // URL 기반 공유 — ?pair=CODE 로 접속 시 자동 연결
  const params = new URLSearchParams(location.search);
  if (params.get("pair") && !pairCode) {
    const code = params.get("pair").toUpperCase();
    if (code !== myCode) {
      pairCode = code;
      save("kk_paircode", pairCode);
      updateSyncUI();
      showToast("🔗 공유 연결됨!");
    }
  }

  // 주기적 동기화 (같은 GitHub Pages URL 접속자끼리)
  startSyncPoll();
}

function startSyncPoll() {
  if (syncTimer) clearInterval(syncTimer);
  if (!pairCode) return;
  syncTimer = setInterval(pollSync, 15000); // 15초마다
  pollSync();
}

// GitHub Gist 기반 동기화 (무료, 익명 가능)
async function pushData() {
  if (!pairCode && !myCode) return;
  const code = pairCode || myCode;
  const data = { txList, assList, ts: Date.now(), code };

  try {
    // localStorage를 공유 저장소로 활용 (같은 origin)
    save(`kk_shared_${code}`, data);
    // BroadcastChannel으로 다른 탭에 알림
    if (window._bc) {
      window._bc.postMessage({ type:"DATA_UPDATE", code, txList, assList });
    }
  } catch(e) {}
}

async function pollSync() {
  if (!pairCode) return;
  try {
    showSyncing(true);
    // 상대방이 저장한 데이터 읽기
    const theirData = load(`kk_shared_${pairCode}`, null);
    if (theirData && theirData.ts > lastSync) {
      txList  = theirData.txList  || txList;
      assList = theirData.assList || assList;
      lastSync = theirData.ts;
      save("kk_lastsync", lastSync);
      saveAll();
      render();
      showToast("🔄 동기화 완료!");
    }
    showSyncing(false);
  } catch(e) { showSyncing(false); }
}

function joinCode() {
  const code = document.getElementById("join-code").value.trim().toUpperCase();
  if (code.length < 4) { showToast("코드를 입력해주세요"); return; }
  if (code === myCode) { showToast("내 코드는 입력할 수 없어요"); return; }
  pairCode = code;
  save("kk_paircode", pairCode);
  updateSyncUI();
  startSyncPoll();
  // 내 데이터 바로 공유
  pushData();
  showToast("🔗 연결됐어요! 상대방도 내 코드를 입력하면 동기화돼요");
  document.getElementById("modal-share").classList.remove("open");
}

function unlinkSync() {
  pairCode = null;
  save("kk_paircode", null);
  if (syncTimer) clearInterval(syncTimer);
  updateSyncUI();
  showToast("연결이 해제됐어요");
}

function copyCode() {
  navigator.clipboard?.writeText(myCode).then(()=>showToast("✅ 코드 복사됨!")).catch(()=>{
    // fallback
    const el = document.createElement("input");
    el.value = myCode; document.body.appendChild(el);
    el.select(); document.execCommand("copy"); document.body.removeChild(el);
    showToast("✅ 코드 복사됨!");
  });
}

function updateSyncUI() {
  const btn   = document.getElementById("sync-btn");
  const label = document.getElementById("sync-label");
  const box   = document.getElementById("sync-status-box");
  const text  = document.getElementById("sync-status-text");
  const sub   = document.getElementById("sync-status-sub");
  const unlink= document.getElementById("unlink-btn");

  if (pairCode) {
    btn.classList.add("linked");
    label.textContent = "연결됨";
    box.classList.add("linked");
    document.querySelector(".sync-status-icon").textContent = "✅";
    text.textContent = "연결됨";
    sub.textContent = `상대 코드: ${pairCode}`;
    unlink.style.display = "block";
  } else {
    btn.classList.remove("linked");
    label.textContent = "공유";
    box.classList.remove("linked");
    document.querySelector(".sync-status-icon").textContent = "🔗";
    text.textContent = "연결되지 않음";
    sub.textContent = "아래에서 공유 코드를 만들거나 입력하세요";
    unlink.style.display = "none";
  }
}

function showSyncing(on) {
  document.getElementById("syncing").classList.toggle("show", on);
}

// ════════════════════════════════════════════
// 유틸
// ════════════════════════════════════════════
const won = n => "₩"+Math.abs(Math.round(n)).toLocaleString("ko-KR");
const compact = n => { const a=Math.abs(n); if(a>=100000000) return (n/100000000).toFixed(1)+"억"; if(a>=10000) return Math.round(n/10000)+"만"; return n.toLocaleString("ko-KR"); };
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2);
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };
const monthTx = () => txList.filter(t=>{ const d=new Date(t.date); return d.getFullYear()===curYear && d.getMonth()===curMonth; });

// ════════════════════════════════════════════
// 탭 & 월
// ════════════════════════════════════════════
function switchTab(name, el) {
  curTab = name;
  document.querySelectorAll(".view").forEach(v=>v.style.display="none");
  document.getElementById("view-"+name).style.display="block";
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  el.classList.add("on");
  render();
}

function changeMonth(d) {
  curMonth += d;
  if (curMonth<0) { curMonth=11; curYear--; }
  if (curMonth>11){ curMonth=0;  curYear++; }
  document.getElementById("mlbl").textContent = `${curYear}.${String(curMonth+1).padStart(2,"0")}`;
  render();
}

// ════════════════════════════════════════════
// 폼 상호작용
// ════════════════════════════════════════════
function selType(type, el) {
  selTxType = type;
  document.querySelectorAll(".trow .tbtn").forEach(b=>b.classList.remove("on","inc","fix","var"));
  el.classList.add("on", type==="income"?"inc":type==="fixed"?"fix":"var");
  renderCatGrid();
}

function selOwner(o, el, gridId) {
  if (gridId==="owner-sel") selTxOwner = o;
  else selAOwner = o;
  document.querySelectorAll(`#${gridId} .obtn`).forEach(b=>b.classList.remove("on","wife","husb","joint"));
  const cls = o==="와이프"?"wife":o==="남편"?"husb":"joint";
  el.classList.add("on", cls);
}

function renderCatGrid() {
  const cats = CATS[selTxType]||[];
  selACat = cats[0]?.id||"";
  document.getElementById("cat-grid").innerHTML = cats.map(c=>
    `<button class="cbtn${c.id===selACat?" on":""}" onclick="selCat('${c.id}',this)">
      <span class="ce">${c.e}</span>${c.id}
    </button>`
  ).join("");
}

function selCat(id, el) {
  selACat = id;
  document.querySelectorAll(".cgrid .cbtn").forEach(b=>b.classList.remove("on"));
  el.classList.add("on");
}

function updAmt() {
  const v = parseFloat(document.getElementById("tx-amt").value)||0;
  document.getElementById("amt-disp").textContent = v>0?"₩"+v.toLocaleString("ko-KR"):"₩0";
}

// ════════════════════════════════════════════
// 저장
// ════════════════════════════════════════════
function saveTx() {
  const amt  = parseFloat(document.getElementById("tx-amt").value);
  const name = document.getElementById("tx-name").value.trim();
  if (!amt||amt<=0) { showToast("금액을 입력해주세요 💸"); return; }
  if (!name)        { showToast("내용을 입력해주세요 ✏️"); return; }
  txList.push({ id:uid(), type:selTxType, cat:selACat, amount:amt, name,
    account: document.getElementById("tx-acct").value,
    owner: selTxOwner,
    date: document.getElementById("tx-date").value,
    memo: document.getElementById("tx-memo").value.trim() });
  saveAll(); pushData();
  document.getElementById("modal-tx").classList.remove("open");
  showToast("✅ 저장됐어요!");
  document.getElementById("tx-amt").value="";
  document.getElementById("tx-name").value="";
  document.getElementById("tx-memo").value="";
  render();
}

function saveAsset() {
  const cur  = parseFloat(document.getElementById("a-cur").value);
  const name = document.getElementById("a-name").value.trim();
  if (!name)     { showToast("항목명을 입력해주세요 ✏️"); return; }
  if (!cur||cur<=0){ showToast("현재가를 입력해주세요 💰"); return; }
  assList.push({ id:uid(),
    type:  document.getElementById("a-type").value,
    name,
    inst:  document.getElementById("a-inst").value.trim(),
    buy:   parseFloat(document.getElementById("a-buy").value)||0,
    cur,
    owner: selAOwner,
    memo:  document.getElementById("a-memo").value.trim() });
  saveAll(); pushData();
  document.getElementById("modal-asset").classList.remove("open");
  showToast("✅ 자산 추가됐어요!");
  ["a-name","a-inst","a-buy","a-cur","a-memo"].forEach(id=>document.getElementById(id).value="");
  render();
}

function delTx(id) {
  if (!confirm("삭제할까요?")) return;
  txList = txList.filter(t=>t.id!==id);
  saveAll(); pushData(); render(); showToast("🗑️ 삭제됐어요");
}
function delAsset(id) {
  if (!confirm("삭제할까요?")) return;
  assList = assList.filter(a=>a.id!==id);
  saveAll(); pushData(); render(); showToast("🗑️ 삭제됐어요");
}

// ════════════════════════════════════════════
// 모달
// ════════════════════════════════════════════
function openModal(type) {
  if (type==="tx") {
    document.getElementById("tx-date").value = todayStr();
    document.getElementById("tx-amt").value  = "";
    document.getElementById("tx-name").value = "";
    document.getElementById("tx-memo").value = "";
    document.getElementById("amt-disp").textContent = "₩0";
    selTxType="income"; selTxOwner="와이프";
    document.querySelectorAll(".trow .tbtn").forEach(b=>b.classList.remove("on","inc","fix","var"));
    document.querySelector(".trow .tbtn").classList.add("on","inc");
    document.querySelectorAll("#owner-sel .obtn").forEach(b=>b.classList.remove("on","wife","husb","joint"));
    document.querySelector("#owner-sel .obtn").classList.add("on","wife");
    renderCatGrid();
  }
  if (type==="asset") {
    ["a-name","a-inst","a-buy","a-cur","a-memo"].forEach(id=>document.getElementById(id).value="");
    selAOwner="와이프";
    document.querySelectorAll("#aowner-sel .obtn").forEach(b=>b.classList.remove("on","wife","husb","joint"));
    document.querySelector("#aowner-sel .obtn").classList.add("on","wife");
  }
  document.getElementById(`modal-${type}`).classList.add("open");
}

function openFab() { openModal(curTab==="asset"?"asset":"tx"); }

function closeOnBack(e, id) {
  if (e.target.classList.contains("mback")) document.getElementById(id).classList.remove("open");
}

function openShareModal() {
  document.getElementById("join-code").value = "";
  document.getElementById("modal-share").classList.add("open");
}

// ════════════════════════════════════════════
// 렌더링
// ════════════════════════════════════════════
function render() {
  const view = document.getElementById("view-"+curTab);
  if (!view || view.style.display==="none") return;
  const txs = monthTx();

  if (curTab==="home")  renderHome(view, txs);
  if (curTab==="tx")    renderTx(view, txs);
  if (curTab==="asset") renderAsset(view);
  if (curTab==="dash")  renderDash(view, txs);
}

function ownerCards(getAmt) {
  return `<div class="orow">
    ${OWNERS.map(o=>`
    <div class="ocard ${o.cls}">
      <div class="onm">${OWNER_ICON[o.id]} ${o.id}</div>
      <div class="oamt">${compact(getAmt(o.id))}</div>
    </div>`).join("")}
  </div>`;
}

function txItemHTML(t) {
  const oc = t.owner==="와이프"?"wife":t.owner==="남편"?"husb":"joint";
  const isInc = t.type==="income";
  return `
  <div class="txitem ${oc}">
    <div class="txico">${CAT_EMOJI[t.cat]||"💸"}</div>
    <div class="txinfo">
      <div class="txname">${t.name}</div>
      <div class="txmeta">
        <span class="badge ${oc}">${t.owner}</span>
        <span class="tbadge ${t.type}">${isInc?"수입":t.type==="fixed"?"고정":"변동"}</span>
        <span>${t.account||""}</span>
      </div>
    </div>
    <div class="txamt ${isInc?"inc":"exp"}">${isInc?"+":"-"}${won(t.amount)}</div>
    <button class="delbtn" onclick="delTx('${t.id}')">✕</button>
  </div>`;
}

function renderHome(el, txs) {
  const income  = txs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const expense = txs.filter(t=>t.type!=="income").reduce((s,t)=>s+t.amount,0);
  const bal     = income-expense;
  const rate    = income>0?((bal/income)*100).toFixed(1):"0.0";
  const recent  = [...txs].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);

  el.innerHTML = `
  <div class="srow">
    <div class="scard"><div class="slbl">💚 수입</div><div class="sval" style="color:var(--income)">${won(income)}</div></div>
    <div class="scard"><div class="slbl">💸 지출</div><div class="sval" style="color:var(--expense)">${won(expense)}</div></div>
    <div class="scard full">
      <div class="slbl">🏦 잔액</div>
      <div class="sval" style="color:${bal>=0?"var(--income)":"var(--expense)"}">${won(bal)}</div>
      <div class="ssub">저축률 ${rate}%</div>
    </div>
  </div>
  ${ownerCards(o=>txs.filter(t=>t.owner===o&&t.type!=="income").reduce((s,t)=>s+t.amount,0))}
  <div class="stitle">최근 거래</div>
  <div class="txlist">${recent.length ? recent.map(txItemHTML).join("") :
    `<div class="empty"><div class="emico">📭</div><div class="emtxt">최근 거래가 없어요\n+ 버튼으로 추가하세요</div></div>`}
  </div>`;
}

function renderTx(el, txs) {
  const sorted = [...txs].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const groups = sorted.reduce((acc,t)=>{ (acc[t.date]??=[]).push(t); return acc; },{});
  const DAY = ["일","월","화","수","목","금","토"];

  el.innerHTML = `<div class="stitle">이번달 거래 (${txs.length}건)</div>
  <div class="txlist">${sorted.length ?
    Object.entries(groups).sort(([a],[b])=>b.localeCompare(a)).map(([date,list])=>{
      const d=new Date(date);
      return `<div class="ddiv">${d.getMonth()+1}월 ${d.getDate()}일 (${DAY[d.getDay()]})</div>`+list.map(txItemHTML).join("");
    }).join("") :
    `<div class="empty"><div class="emico">📋</div><div class="emtxt">거래 내역이 없어요</div></div>`
  }</div>`;
}

function renderAsset(el) {
  const totalAss = assList.reduce((s,a)=>s+a.cur,0);
  const totalPnl = totalAss - assList.reduce((s,a)=>s+a.buy,0);
  const types = [...new Set(assList.map(a=>a.type))];

  el.innerHTML = `
  <div class="srow">
    <div class="scard"><div class="slbl">💎 총 자산</div><div class="sval" style="color:var(--income)">${won(totalAss)}</div></div>
    <div class="scard"><div class="slbl">📈 총 손익</div><div class="sval" style="color:${totalPnl>=0?"var(--income)":"var(--expense)"}">${totalPnl>=0?"+":""}${won(totalPnl)}</div></div>
  </div>
  ${ownerCards(o=>assList.filter(a=>a.owner===o).reduce((s,a)=>s+a.cur,0))}
  ${types.length ? types.map(type=>{
    const items = assList.filter(a=>a.type===type);
    const tot   = items.reduce((s,a)=>s+a.cur,0);
    const color = ASSET_COLOR[type]||"#94a3b8";
    return `
    <div class="asec">
      <div class="asec-hdr">
        <div class="adot" style="background:${color}"></div>
        <div class="atnm">${ASSET_EMOJI[type]||""} ${type}</div>
        <div class="attot">${won(tot)}</div>
      </div>
      ${items.map(a=>{
        const pnl=a.cur-a.buy, rate=a.buy>0?((pnl/a.buy)*100).toFixed(1):0;
        const oc=a.owner==="와이프"?"wife":a.owner==="남편"?"husb":"joint";
        return `
        <div class="aitem">
          <div class="ainf">
            <div class="anm">${a.name}</div>
            <div class="asub"><span class="badge ${oc}">${a.owner}</span>${a.inst?`<span>· ${a.inst}</span>`:""}${a.memo?`<span>· ${a.memo}</span>`:""}</div>
          </div>
          <div class="avals">
            <div class="acur" style="color:${color}">${won(a.cur)}</div>
            <div class="apnl ${pnl>=0?"pos":"neg"}">${pnl>=0?"+":""}${won(pnl)} (${rate}%)</div>
          </div>
          <button class="delbtn" style="margin-left:6px" onclick="delAsset('${a.id}')">✕</button>
        </div>`;
      }).join("")}
    </div>`;
  }).join("") : `<div class="empty"><div class="emico">💰</div><div class="emtxt">자산을 추가해보세요\n+ 버튼으로 추가하세요</div></div>`}`;
}

function renderDash(el, txs) {
  const catMap={};
  txs.filter(t=>t.type!=="income").forEach(t=>{ catMap[t.cat]=(catMap[t.cat]||0)+t.amount; });
  const totalExp2 = Object.values(catMap).reduce((s,v)=>s+v,0);
  const sorted    = Object.entries(catMap).sort(([,a],[,b])=>b-a);
  const colors    = ["#f472b6","#60a5fa","#a78bfa","#34d399","#fbbf24","#f97316","#94a3b8","#22d3ee"];
  const fixedAmt  = txs.filter(t=>t.type==="fixed").reduce((s,t)=>s+t.amount,0);
  const varAmt    = txs.filter(t=>t.type==="variable").reduce((s,t)=>s+t.amount,0);
  const OC = {"와이프":"var(--wife)","남편":"var(--husb)","공동":"var(--joint)"};
  const OB = {"와이프":"var(--wife)","남편":"var(--husb)","공동":"var(--joint)"};

  el.innerHTML = `
  <div class="stitle">지출자별 분석</div>
  <div class="dgrid">
    ${OWNERS.map((o,i)=>`
    <div class="dcard${i===2?" wide":""}" style="border-top:2px solid ${OB[o.id]}">
      <div class="dlbl">${OWNER_ICON[o.id]} ${o.id} 지출</div>
      <div class="dval" style="color:${OC[o.id]}">${won(txs.filter(t=>t.owner===o.id&&t.type!=="income").reduce((s,t)=>s+t.amount,0))}</div>
    </div>`).join("")}
  </div>

  <div class="stitle">카테고리별 지출</div>
  ${sorted.length ? sorted.map(([cat,amt],i)=>{
    const pct=totalExp2>0?(amt/totalExp2*100).toFixed(0):0;
    return `
    <div class="pbar-wrap">
      <div class="pbar-lbl"><span>${CAT_EMOJI[cat]||"📦"} ${cat}</span><span>${won(amt)} (${pct}%)</span></div>
      <div class="pbar"><div class="pfill" style="width:${pct}%;background:${colors[i%colors.length]}"></div></div>
    </div>`;
  }).join("") : `<div style="color:var(--muted);font-size:13px;padding:6px 0">지출 내역이 없어요</div>`}

  <div class="stitle" style="margin-top:18px">고정비 vs 변동비</div>
  <div class="dgrid">
    <div class="dcard" style="border-top:2px solid var(--fixed)"><div class="dlbl">📌 고정지출</div><div class="dval" style="color:var(--fixed)">${won(fixedAmt)}</div></div>
    <div class="dcard" style="border-top:2px solid var(--expense)"><div class="dlbl">📈 변동지출</div><div class="dval" style="color:var(--expense)">${won(varAmt)}</div></div>
  </div>

  <div class="stitle">보유자별 자산</div>
  <div class="dgrid">
    ${OWNERS.map((o,i)=>`
    <div class="dcard${i===2?" wide":""}" style="border-top:2px solid ${OB[o.id]}">
      <div class="dlbl">${OWNER_ICON[o.id]} ${o.id} 자산</div>
      <div class="dval" style="color:${OC[o.id]}">${won(assList.filter(a=>a.owner===o.id).reduce((s,a)=>s+a.cur,0))}</div>
    </div>`).join("")}
  </div>`;
}

function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"), 2200);
}

document.getElementById("mlbl").textContent = `${curYear}.${String(curMonth+1).padStart(2,"0")}`;

// 공유 버튼에 openShareModal 연결
document.getElementById("sync-btn").onclick = openShareModal;

renderCatGrid();
initSync();
render();
